# ════════════════════════════════════════════════════════════════
# OVERPASS QUERY REFERENCE (Documentation)
# These are the canonical queries for each risk category.
# Useful for reviewers and for testing in Overpass Turbo manually.
# ════════════════════════════════════════════════════════════════

queries:
  
  industrial: |
    [out:json][timeout:120][bbox:{bbox}];
    (
      way["landuse"="industrial"];
      relation["landuse"="industrial"];
      way["landuse"="quarry"];
      way["industrial"="factory"];
      way["man_made"="works"];
    );
    out body geom;
  
  abandoned: |
    [out:json][timeout:120][bbox:{bbox}];
    (
      way["building"="ruins"];
      way["abandoned"="yes"];
      way["disused"="yes"];
      way["building:condition"="bad"];
      way["landuse"="brownfield"];
      relation["landuse"="brownfield"];
    );
    out body geom;
  
  poorly_lit_roads: |
    [out:json][timeout:180][bbox:{bbox}];
    (
      // Roads explicitly tagged as not lit (highest confidence signal)
      way["highway"~"^(primary|secondary|tertiary|residential|unclassified|service)$"]["lit"="no"];
      way["highway"~"^(primary|secondary|tertiary|residential|unclassified|service)$"]["lit"="disused"];
      
      // Residential & through-roads with poor surface
      // EXCLUDES service=driveway/parking_aisle (private property)
      way["highway"="residential"]["surface"~"^(unpaved|dirt|ground|mud|gravel)$"];
      way["highway"="unclassified"]["surface"~"^(unpaved|dirt|ground|mud|gravel)$"];
      way["highway"="tertiary"]["surface"~"^(unpaved|dirt|ground|mud|gravel)$"];
      
      // Service roads with poor surface, but EXCLUDE private driveways
      way["highway"="service"]["surface"~"^(unpaved|dirt|ground)$"]["service"!~"driveway|parking_aisle|drive-through"];
      
      // Roads with explicitly bad smoothness
      way["highway"~"^(primary|secondary|tertiary|residential|unclassified)$"]["smoothness"~"^(very_bad|horrible|very_horrible)$"];
      
      // Tunnels without lighting (specific safety hazard)
      way["tunnel"="yes"]["lit"="no"];
    );
    out body geom;
  
  restricted: |
    [out:json][timeout:120][bbox:{bbox}];
    (
      way["access"="no"];
      relation["access"="no"];
      way["landuse"="military"];
      relation["landuse"="military"];
      way["military"="danger_area"];
    );
    out body geom;
  
  unsafe_transit: |
    [out:json][timeout:120][bbox:{bbox}];
    (
      node["highway"="bus_stop"]["lit"="no"];
      node["highway"="bus_stop"]["shelter"="no"];
      node["railway"="halt"];
      node["amenity"="bus_station"]["lit"="no"];
    );
    out body geom;
  
  accident_junction: |
    [out:json][timeout:120][bbox:{bbox}];
    (
      // Traffic signals on major roads only (not residential/service)
      // Note: We need a 2-step approach since OSM doesn't directly link 
      // junction nodes to road classes. We'll get all signals and 
      // filter by spatial proximity in processing if needed.
      node["highway"="traffic_signals"];
      
      // All roundabouts (these are inherently major junctions)
      way["junction"="roundabout"];
      
      // Pedestrian crossings WITH safety markings (more significant)
      // EXCLUDES casual residential zebra crossings
      node["highway"="crossing"]["crossing"~"^(traffic_signals|uncontrolled|marked)$"];
      
      // Mini roundabouts (also significant)
      node["highway"="mini_roundabout"];
    );
    out body geom;
  
  # ════════════════════════════════════════════════════════════
  # EMERGENCY SERVICES — SINGLE COMBINED QUERY
  # All emergency facilities in one efficient request
  # ════════════════════════════════════════════════════════════
  
  emergency_all: |
    [out:json][timeout:300][bbox:{bbox}];
    (
      // Hospitals
      node["amenity"="hospital"];
      way["amenity"="hospital"];
      
      // Clinics with emergency
      node["amenity"="clinic"]["emergency"="yes"];
      way["amenity"="clinic"]["emergency"="yes"];
      
      // Healthcare facilities
      node["healthcare"="hospital"];
      way["healthcare"="hospital"];
      
      // Police
      node["amenity"="police"];
      way["amenity"="police"];
      
      // Fire stations
      node["amenity"="fire_station"];
      way["amenity"="fire_station"];
      
      // Ambulance stations
      node["emergency"="ambulance_station"];
      way["emergency"="ambulance_station"];
      
      // 24/7 pharmacies
      node["amenity"="pharmacy"]["opening_hours"~"24/7"];
      
      // Emergency shelters
      node["amenity"="shelter"]["shelter_type"="emergency"];
      
      // General emergency facilities
      node["emergency"~"^(yes|fire_station|ambulance_station|disaster_response|assembly_point)$"];
      way["emergency"~"^(yes|fire_station|ambulance_station|disaster_response|assembly_point)$"];
    );
    out body geom tags;